<section class="bg-[#1A1C1C] text-white p-5 rounded-2xl space-y-4 overflow-hidden relative">
  <div class="absolute top-0 right-0 w-24 h-24 bg-[#FFD700]/5 rounded-full -mr-12 -mt-12 pointer-events-none"></div>
  <div class="flex justify-between items-center relative z-10">
    <h3 class="font-headline font-bold text-sm">Piyasa Ekranı</h3>
    <span class="text-[9px] bg-[#FFD700]/20 text-[#FFD700] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Canlı</span>
  </div>
  <div *ngIf="yukleniyor" class="flex items-center justify-center py-4">
    <div class="w-5 h-5 border-2 border-[#FFD700]/30 border-t-[#FFD700] rounded-full animate-spin"></div>
  </div>
  <div *ngIf="!yukleniyor" class="space-y-2 relative z-10">
    <div *ngFor="let kur of kurlar | keyvalue"
         class="flex justify-between items-center p-2.5 bg-white/5 rounded-lg">
      <span class="text-xs font-bold">{{ kur.key }}/TRY</span>
      <p class="text-sm font-black">{{ kur.value | number:'1.4-4' }}</p>
    </div>
    <p *ngIf="(kurlar | keyvalue).length === 0" class="text-xs text-neutral-500 text-center py-2">Kur bilgisi alınamadı.</p>
  </div>
  <p class="text-[9px] text-neutral-600 text-center uppercase tracking-tighter">Son Güncelleme: {{ sonGuncelleme }}</p>
</section>
