<header class="fixed top-0 w-full z-50 bg-[#F9F9F9]/95 backdrop-blur-sm">
  <div class="flex justify-between items-center px-8 h-16 w-full max-w-full">
    <!-- Logo -->
    <a routerLink="/basvuru" class="flex items-center">
      <img src="assets/vakifbank-logo.png" alt="VakıfBank" class="h-6 w-auto"/>
    </a>
    <!-- Nav -->
    <nav class="hidden md:flex items-center space-x-1">
      <a routerLink="/basvuru" routerLinkActive="text-[#705D00] font-bold border-b-2 border-[#FFD700]"
         class="text-neutral-500 font-medium px-4 py-2 text-sm transition-colors hover:text-[#705D00]">
        Başvurular
      </a>
      <a href="#" class="text-neutral-500 font-medium px-4 py-2 text-sm hover:text-[#705D00] transition-colors">İşlemler</a>
      <a href="#" class="text-neutral-500 font-medium px-4 py-2 text-sm hover:text-[#705D00] transition-colors">Destek</a>
    </nav>
    <!-- Actions -->
    <div class="flex items-center gap-2">
      <button class="p-2 text-neutral-400 hover:text-[#705D00] hover:bg-[#FFD700]/10 rounded-full transition-all">
        <span class="material-symbols-outlined text-xl">notifications</span>
      </button>
      <button class="p-2 text-neutral-400 hover:text-[#705D00] hover:bg-[#FFD700]/10 rounded-full transition-all">
        <span class="material-symbols-outlined text-xl">help</span>
      </button>
      <button class="p-2 text-neutral-400 hover:text-[#705D00] hover:bg-[#FFD700]/10 rounded-full transition-all">
        <span class="material-symbols-outlined text-xl">account_circle</span>
      </button>
    </div>
  </div>
  <div class="h-[1px] bg-neutral-100"></div>
</header>
