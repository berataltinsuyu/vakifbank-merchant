<aside class="fixed left-0 top-16 h-[calc(100vh-64px)] w-64 bg-[#F3F3F3]
              flex flex-col py-8 z-40 hidden md:flex"
       style="box-shadow: 4px 0 40px rgba(0,0,0,0.04)">

<!-- Hesap Bilgisi — gerçek kullanıcı adı artık geliyor -->
<div class="px-6 mb-8">
  <div class="flex items-center gap-3 p-3 bg-white rounded-xl shadow-sm">
    <div class="w-10 h-10 rounded-lg bg-[#FFD700] flex items-center justify-center">
      <span class="material-symbols-outlined text-[#705D00] text-lg">account_circle</span>
    </div>
    <div>
      <p class="font-headline font-bold text-[#705D00] text-xs leading-tight">
        {{ authService.kullaniciBilgisi()?.rol || 'Personel' }}
      </p>
      <p class="text-[11px] text-neutral-400 mt-0.5">
        {{ authService.kullaniciBilgisi()?.adSoyad || '' }}
      </p>
    </div>
  </div>
</div>

  <!-- Nav -->
  <nav class="flex-grow px-3 space-y-1">

    <a routerLink="/basvuru" routerLinkActive="bg-white text-[#705D00] shadow-sm"
       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-neutral-500 hover:bg-white/70 hover:text-[#705D00]">
      <span class="material-symbols-outlined text-lg">assignment_add</span>
      Yeni Başvuru
    </a>

    <a routerLink="/gecmis" routerLinkActive="bg-white text-[#705D00] shadow-sm"
       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-neutral-500 hover:bg-white/70 hover:text-[#705D00]">
      <span class="material-symbols-outlined text-lg">history</span>
      Başvuru Geçmişi
    </a>

    <a href="#"
       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-semibold text-sm text-neutral-500 hover:bg-white/70 hover:text-[#705D00]">
      <span class="material-symbols-outlined text-lg">settings</span>
      Ayarlar
    </a>

  </nav>

  <!-- Çıkış -->
  <div class="px-3 mt-4">
    <button (click)="cikisYap()"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-neutral-400
                   hover:text-red-500 hover:bg-red-50 transition-all font-semibold text-sm">
      <span class="material-symbols-outlined text-lg">logout</span>
      Çıkış Yap
    </button>
  </div>

</aside>
