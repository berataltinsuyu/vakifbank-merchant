<div class="min-h-screen bg-[#F3F3F3] flex">

  <!-- Sol Panel -->
  <div class="hidden lg:flex lg:w-1/2 bg-[#1A1C1C] flex-col justify-between p-12 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-96 h-96 bg-[#FFD700]/5 rounded-full -mr-48 -mt-48 pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-[#FFD700]/5 rounded-full -ml-32 -mb-32 pointer-events-none"></div>
    <div class="relative z-10">
      <img src="assets/Vakıfbank_logo_login.png" alt="VakıfBank" class="h-9 w-auto brightness-0 invert"/>
    </div>
    <div class="relative z-10 space-y-6">
      <div class="w-10 h-1 bg-[#FFD700]"></div>
      <h1 class="font-headline text-4xl font-black text-white leading-tight">
        Üye İşyeri<br/><span class="text-[#FFD700]">Başvuru</span><br/>Sistemi
      </h1>
      <!-- <p class="text-neutral-400 text-sm leading-relaxed max-w-xs">
        Dijital ödeme çözümleri ve kurumsal avantajlar için başvurunuzu hızlıca tamamlayın.
      </p> -->
    </div>
    <div class="relative z-10 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-[#FFD700]/10 flex items-center justify-center">
        <span class="material-symbols-outlined text-[#FFD700] text-sm">verified_user</span>
      </div>
      <p class="text-[11px] text-neutral-500">256-bit SSL güvenliği · KVKK uyumlu</p>
    </div>
  </div>

  <!-- Sağ Panel -->
  <div class="flex-1 flex items-center justify-center p-8">
    <div class="w-full max-w-md space-y-8">

      <div class="space-y-2">
        <img src="assets/vakifbank-logo.png" alt="VakıfBank" class="h-8 w-auto lg:hidden mb-6"/>
        <h2 class="font-headline text-3xl font-black text-[#1A1C1C]">Hoş Geldiniz</h2>
        <p class="text-sm text-neutral-500">Kurumsal hesabınızla giriş yapın</p>
      </div>

      <div *ngIf="hata" class="flex items-center gap-3 bg-red-50 px-4 py-3 rounded-xl">
        <span class="material-symbols-outlined text-red-500 text-sm">error</span>
        <span class="text-sm text-red-700">{{ hata }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="girisYap()" class="space-y-5" novalidate>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-neutral-500 uppercase tracking-wider">Kurumsal E-posta</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-300 text-lg">mail</span>
            <input formControlName="email" type="email" placeholder="ad.soyad@vakifbank.com.tr"
                   class="w-full pl-11 pr-4 py-3.5 bg-white rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#FFD700]/50 shadow-sm placeholder-neutral-300"
                   [class.ring-2]="hataVar('email')" [class.ring-red-200]="hataVar('email')"/>
          </div>
          <p *ngIf="hataVar('email')" class="text-xs text-red-500 flex items-center gap-1">
            <span class="material-symbols-outlined text-xs">error</span> Geçerli bir e-posta girin.
          </p>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-neutral-500 uppercase tracking-wider">Şifre</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-300 text-lg">lock</span>
            <input formControlName="sifre" [type]="sifreGoster ? 'text' : 'password'" placeholder="••••••••"
                   class="w-full pl-11 pr-12 py-3.5 bg-white rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#FFD700]/50 shadow-sm placeholder-neutral-300"
                   [class.ring-2]="hataVar('sifre')" [class.ring-red-200]="hataVar('sifre')"/>
            <button type="button" (click)="sifreGoster = !sifreGoster"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-300 hover:text-[#705D00] transition-colors">
              <span class="material-symbols-outlined text-lg">{{ sifreGoster ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
          <p *ngIf="hataVar('sifre')" class="text-xs text-red-500 flex items-center gap-1">
            <span class="material-symbols-outlined text-xs">error</span> Şifre en az 6 karakter olmalıdır.
          </p>
        </div>

        <div class="flex justify-end">
          <a href="#" class="text-xs text-[#705D00] font-semibold hover:underline">Şifremi Unuttum</a>
        </div>

        <button type="submit" [disabled]="yukleniyor"
                class="w-full py-4 bg-[#FFD700] text-[#705D00] font-black text-sm rounded-xl
                       hover:bg-[#FFE16D] active:scale-[0.98] transition-all disabled:opacity-60
                       flex items-center justify-center gap-2"
                style="box-shadow:0 4px 20px rgba(255,215,0,0.3)">
          <span *ngIf="!yukleniyor">Giriş Yap</span>
          <span *ngIf="yukleniyor" class="flex items-center gap-2">
            <div class="w-4 h-4 border-2 border-[#705D00]/30 border-t-[#705D00] rounded-full animate-spin"></div>
            Giriş yapılıyor...
          </span>
        </button>

      </form>

      <!-- <p class="text-center text-xs text-neutral-400">
        Hesabınız yok mu?
        <a href="#" class="text-[#705D00] font-semibold hover:underline">Destek ile iletişime geçin</a>
      </p> -->

    </div>
  </div>
</div>
